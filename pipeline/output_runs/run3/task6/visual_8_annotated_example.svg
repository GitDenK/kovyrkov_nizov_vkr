      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  <rect width="500" height="1686" fill="white"/>
  <text x="250" y="44" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">Решение показательного уравнения $4^{x+1} = 8$</text>
  <line x1="250.0" y1="122.0" x2="250.0" y2="192.0" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="250.0" y1="244.0" x2="250.0" y2="314.0" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
