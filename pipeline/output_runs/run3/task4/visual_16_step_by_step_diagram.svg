  <text x="250.0" y="240.5" text-anchor="middle" font-size="13" fill="#333">(2, 5) → 2+5=7</text>
  <rect x="120.0" y="326.0" width="260" height="52.0" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="1.5"/>
  <text x="250.0" y="345.5" text-anchor="middle" font-size="13" fill="#333"></text>
  <text x="250.0" y="362.5" text-anchor="middle" font-size="13" fill="#333">(3, 4) → 3+4=7</text>
