  <text x="250.0" y="606.5" text-anchor="middle" font-size="13" fill="#333">(5, 2) → 5+2=7</text>
  <rect x="120.0" y="692.0" width="260" height="52.0" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="1.5"/>
