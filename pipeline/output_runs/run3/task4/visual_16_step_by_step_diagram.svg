  </defs>
  <rect width="500" height="978" fill="white"/>
  <text x="250" y="44" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">Найдём m — пары, где a + b = 7</text>
  <line x1="250.0" y1="134.0" x2="250.0" y2="204.0" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
