<svg xmlns="http://www.w3.org/2000/svg" width="500" height="916">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  <rect width="500" height="916" fill="white"/>
  <text x="250" y="44" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">Определение производной и её значения в разных ситуациях</text>
  <line x1="250.0" y1="174.0" x2="250.0" y2="244.0" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="250.0" y1="408.0" x2="250.0" y2="478.0" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="250.0" y1="622.0" x2="250.0" y2="692.0" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="120.0" y="70.0" width="260" height="104.0" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="1.5"/>
  <text x="250.0" y="124.0" text-anchor="middle" font-size="13" fill="#333">definition: Производная — это ско…</text>
  <rect x="120.0" y="244.0" width="260" height="164.0" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="1.5"/>
  <text x="250.0" y="311.0" text-anchor="middle" font-size="13" fill="#333">description: Если функция быстро …</text>
  <text x="250.0" y="328.0" text-anchor="middle" font-size="13" fill="#333">slope: близок к +∞</text>
  <text x="250.0" y="345.0" text-anchor="middle" font-size="13" fill="#333">derivative: большая положительная</text>
  <rect x="120.0" y="478.0" width="260" height="144.0" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="1.5"/>
