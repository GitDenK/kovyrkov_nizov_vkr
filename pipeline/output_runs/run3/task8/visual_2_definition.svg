  <text x="250.0" y="552.0" text-anchor="middle" font-size="13" fill="#333">slope: отрицательная</text>
  <text x="250.0" y="569.0" text-anchor="middle" font-size="13" fill="#333">derivative: отрицательная</text>
  <rect x="120.0" y="692.0" width="260" height="124.0" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="1.5"/>
