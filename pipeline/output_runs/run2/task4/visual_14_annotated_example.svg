  <rect x="120.0" y="70.0" width="260" height="84.0" rx="6" fill="#fdebd0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="250.0" y="114.0" text-anchor="middle" font-size="13" fill="#333">Задача: Найдите вероятность того,…</text>
