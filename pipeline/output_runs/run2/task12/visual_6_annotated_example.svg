  <rect x="120.0" y="70.0" width="260" height="64.0" rx="6" fill="#fdebd0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="250.0" y="104.0" text-anchor="middle" font-size="13" fill="#333">Задача: Найти наибольшее значение…</text>
  <rect x="120.0" y="326.0" width="260" height="52.0" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="1.5"/>
  <text x="250.0" y="354.0" text-anchor="middle" font-size="13" fill="#333">Запишем функцию</text>
  <rect x="120.0" y="570.0" width="260" height="52.0" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="1.5"/>
  <text x="250.0" y="598.0" text-anchor="middle" font-size="13" fill="#333">Найдем производную</text>
  <rect x="120.0" y="814.0" width="260" height="52.0" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="1.5"/>
