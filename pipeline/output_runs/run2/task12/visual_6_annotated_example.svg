  <rect x="120.0" y="1302.0" width="260" height="64.0" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="1.5"/>
  <text x="250.0" y="1336.0" text-anchor="middle" font-size="13" fill="#333">Вычислим значения функции в конца…</text>
  <rect x="120.0" y="1558.0" width="260" height="52.0" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="1.5"/>
  <text x="250.0" y="1586.0" text-anchor="middle" font-size="13" fill="#333">Сравним значения и определим наиб…</text>
  <rect x="120.0" y="204.0" width="260" height="52.0" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="1.5"/>
  <text x="250.0" y="232.0" text-anchor="middle" font-size="13" fill="#333">$f(x) = x^2 - 4x + 5$</text>
  <rect x="120.0" y="448.0" width="260" height="52.0" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="1.5"/>
  <text x="250.0" y="476.0" text-anchor="middle" font-size="13" fill="#333">$f&#x27;(x) = 2x - 4$</text>
  <rect x="120.0" y="692.0" width="260" height="52.0" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="1.5"/>
  <text x="250.0" y="720.0" text-anchor="middle" font-size="13" fill="#333">$2x - 4 = 0$</text>
  <rect x="120.0" y="936.0" width="260" height="52.0" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="1.5"/>
  <text x="250.0" y="964.0" text-anchor="middle" font-size="13" fill="#333">$x = 2$</text>
  <rect x="120.0" y="1180.0" width="260" height="52.0" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="1.5"/>
  <text x="250.0" y="1208.0" text-anchor="middle" font-size="13" fill="#333">$f(0) = 5, f(2) = 1, f(3) = 2$</text>
  <rect x="120.0" y="1436.0" width="260" height="52.0" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="1.5"/>
  <text x="250.0" y="1464.0" text-anchor="middle" font-size="13" fill="#333">$Наибольшее значение: 5$</text>
